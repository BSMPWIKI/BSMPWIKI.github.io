<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>BSMP · ARCANVM</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    /* ===== RESET & ROOT ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --text: #e0e0e0;
      --border: #2a2a2a;
      --accent: #00ff88;
      --font: 'Press Start 2P', 'Courier New', monospace;
    }
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.6;
      image-rendering: pixelated;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      overflow: hidden;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border: 2px solid var(--bg);
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }

    /* ===== CONTAINER PRINCIPAL ===== */
    .container {
      max-width: 1100px;
      width: 100%;
      height: 94vh;
      max-height: 750px;
      background: var(--surface);
      border: 2px solid var(--border);
      box-shadow: 0 0 60px rgba(0, 255, 136, 0.04);
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 0;
      overflow: hidden;
      padding: 16px;
    }

    /* ===== COLUMNA IZQUIERDA ===== */
    .left-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-right: 16px;
      border-right: 2px solid var(--border);
      gap: 16px;
      min-width: 0;
      position: relative;
    }
    .left-col .logo-wrap {
      text-align: center;
      width: 100%;
    }
    .left-col .logo-big {
      max-width: 250px;
      width: 100%;
      height: auto;
      filter: invert(1) brightness(2) contrast(1.2);
      image-rendering: pixelated;
      display: block;
      margin: 0 auto;
    }
    .left-col .countdown-wrap {
      text-align: center;
      width: 100%;
      border-top: 2px solid var(--border);
      padding-top: 16px;
    }
    .left-col .countdown-wrap .label {
      font-size: 0.55rem;
      letter-spacing: 3px;
      opacity: 0.5;
      text-transform: uppercase;
    }
    .left-col .countdown-wrap .timer {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 3px;
      margin-top: 6px;
      text-shadow: 0 0 30px rgba(0, 255, 136, 0.15);
    }

    /* ===== COLUMNA DERECHA: CHAT CORREGIDA ===== */
    .chat-col {
      display: flex;
      flex-direction: column;
      padding-left: 16px;
      min-width: 0;
      height: 100%;
      overflow: hidden; /* Evita que se desborde el contenedor */
    }
    .chat-col .chat-header {
      font-size: 0.6rem;
      letter-spacing: 3px;
      opacity: 0.4;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--border);
      margin-bottom: 8px;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .chat-container {
      background: var(--bg);
      border: 2px solid var(--border);
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;      /* CLAVE para que el flex hijo pueda encoger y scroll */
      overflow: hidden;
    }
    .chat-messages {
      flex: 1 1 auto;     /* Ocupa todo el espacio, pero puede reducirse */
      min-height: 0;      /* Necesario para que overflow funcione */
      overflow-y: auto;   /* Scroll automático solo cuando se necesite */
      overflow-x: hidden;
      padding: 10px;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .msg {
      display: flex;
      gap: 10px;
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      align-items: center;
      flex-shrink: 0;
    }
    .msg .avatar {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      border-radius: 50%;
      background: var(--bg);
      flex-shrink: 0;
      overflow: hidden;
      image-rendering: pixelated;
    }
    .msg .avatar img {
      width: 100%;
      height: 100%;
      display: block;
    }
    .msg .content {
      flex: 1;
      min-width: 0;
    }
    .msg .user {
      font-size: 0.55rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 2px;
    }
    .msg .text {
      font-size: 0.55rem;
      opacity: 0.9;
      word-break: break-word;
    }
    .chat-input {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 6px;
      padding: 8px;
      border-top: 2px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;     /* Evita que el input se encoja */
    }
    .chat-input input {
      background: var(--surface);
      border: 2px solid var(--border);
      color: var(--text);
      padding: 6px;
      font-size: 0.5rem;
      font-family: var(--font);
      outline: none;
    }
    .chat-input input:focus {
      border-color: var(--accent);
    }
    .chat-input button {
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 0 16px;
      font-size: 0.5rem;
      font-family: var(--font);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .chat-input button:hover {
      opacity: 0.7;
    }
    .chat-input button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* ===== SELECTOR DE IDIOMA ===== */
    .lang-selector {
      position: absolute;
      top: 8px;
      left: 8px;
      background: var(--bg);
      border: 2px solid var(--border);
      color: var(--text);
      padding: 2px 6px;
      font-size: 0.4rem;
      font-family: var(--font);
      cursor: pointer;
      outline: none;
      z-index: 10;
    }

    /* ===== FOOTER ===== */
    .footer {
      text-align: center;
      padding: 6px 0 2px;
      font-size: 0.4rem;
      opacity: 0.3;
      letter-spacing: 2px;
      border-top: 2px solid var(--border);
      margin-top: 8px;
      width: 100%;
      flex-shrink: 0;
    }

    /* ===== EFECTO CRT ===== */
    .crt-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9997;
      background: repeating-linear-gradient(0deg,
          rgba(0, 0, 0, 0.06) 0px,
          rgba(0, 0, 0, 0.06) 2px,
          transparent 2px,
          transparent 4px);
      mix-blend-mode: multiply;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      body {
        overflow: auto;
        align-items: flex-start;
      }
      .container {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        min-height: 100vh;          /* En móvil ocupa toda la pantalla */
        height: auto;
        max-height: none;
        padding: 12px;
        gap: 8px;
      }
      .left-col {
        border-right: none;
        padding-right: 0;
        border-bottom: 2px solid var(--border);
        padding-bottom: 12px;
      }
      .chat-col {
        padding-left: 0;
        margin-top: 4px;
        height: 100%;
        min-height: 0;              /* Para que el flex pueda ajustarse */
      }
      .chat-container {
        height: 100%;
      }
      .left-col .logo-big {
        max-width: 180px;
      }
      .left-col .countdown-wrap .timer {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="crt-overlay"></div>

  <div class="container">
    <!-- COLUMNA IZQUIERDA -->
    <div class="left-col">
      <select class="lang-selector" id="langSelector">
        <option value="es">ES</option>
        <option value="en">EN</option>
        <option value="pt">PT</option>
        <option value="fr">FR</option>
        <option value="de">DE</option>
        <option value="jp">JP</option>
      </select>

      <div class="logo-wrap">
        <img src="https://i.ibb.co/k24Vx68f/Proyecto-nuevo-23.png" alt="BSMP2" class="logo-big" />
      </div>

      <div class="countdown-wrap">
        <div class="label" data-i18n="countdown_label">DESBLOQUEO EN</div>
        <div class="timer" id="countdownTimer">--:--:--</div>
      </div>

      <div class="footer">
        <span>BSMP</span>
        <span style="display:block; margin-top:4px;">"No confíes en tu propio reflejo."</span>
      </div>
    </div>

    <!-- COLUMNA DERECHA: CHAT -->
    <div class="chat-col">
      <div class="chat-header">▸ TERMINAL DE TRANSMISIÓN</div>
      <div class="chat-container">
        <div class="chat-messages" id="chatDisplay"></div>
        <div class="chat-input">
          <input type="text" id="chatUser" placeholder="USUARIO" maxlength="20" />
          <input type="text" id="chatMsg" placeholder="MENSAJE" maxlength="200" />
          <button id="chatSend">ENVIAR</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== FIREBASE MODERNO SEGURO ===== -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDUjORFPVwfOngb2KDPAdrAclIeHnzH5Ck",
      authDomain: "bsmp2-3f7b2.firebaseapp.com",
      projectId: "bsmp2-3f7b2",
      storageBucket: "bsmp2-3f7b2.firebasestorage.app",
      messagingSenderId: "347248175152",
      appId: "1:347248175152:web:0bbf91b3851ded236a65f5",
      measurementId: "G-S0CMJTV7N8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const chatDisplay = document.getElementById('chatDisplay');
    const chatUser = document.getElementById('chatUser');
    const chatMsg = document.getElementById('chatMsg');
    const chatSend = document.getElementById('chatSend');

    const messagesCol = collection(db, "comentarios");
    const q = query(messagesCol, orderBy("time", "asc"));
    
    onSnapshot(q, (snap) => {
      chatDisplay.innerHTML = '';
      snap.forEach(doc => {
        const data = doc.data();
        const user = data.user || 'anonimo';
        const avatarUrl = `https://mc-heads.net/avatar/${user}/32`;
        const div = document.createElement('div');
        div.className = 'msg';
        div.innerHTML = `
          <div class="avatar"><img src="${avatarUrl}" alt="${user}" onerror="this.src='https://mc-heads.net/avatar/steve/32'" /></div>
          <div class="content">
            <div class="user">${user}</div>
            <div class="text">${data.text || ''}</div>
          </div>
        `;
        chatDisplay.appendChild(div);
      });
      // Scroll al final después de actualizar
      chatDisplay.scrollTop = chatDisplay.scrollHeight;
    });

    chatSend.addEventListener('click', async () => {
      const user = chatUser.value.trim() || 'anonimo';
      const text = chatMsg.value.trim();
      if (!text) return;
      chatSend.disabled = true;
      try {
        await addDoc(messagesCol, { user, text, time: serverTimestamp() });
        chatMsg.value = '';
      } catch (e) { console.error(e); }
      chatSend.disabled = false;
    });
    chatMsg.addEventListener('keydown', (e) => { if (e.key === 'Enter') chatSend.click(); });

    // ===== COUNTDOWN =====
    const target = new Date("July 10, 2026 00:00:00").getTime();
    const timerEl = document.getElementById('countdownTimer');
    
    setInterval(() => {
      const d = target - Date.now();
      if (d <= 0) { timerEl.textContent = "00:00:00"; return; }
      const days = Math.floor(d / (1000 * 60 * 60 * 24));
      const hours = Math.floor((d % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const mins = Math.floor((d % (1000 * 60 * 60)) / (1000 * 60));
      const secs = Math.floor((d % (1000 * 60)) / 1000);
      timerEl.textContent = `${days}d ${hours.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }, 1000);

    // ===== TRADUCCIONES =====
    const translations = {
      es: { countdown_label: 'DESBLOQUEO EN' },
      en: { countdown_label: 'UNLOCK IN' },
      pt: { countdown_label: 'DESBLOQUEIO EM' },
      fr: { countdown_label: 'DÉVERROUILLAGE LE' },
      de: { countdown_label: 'FREISCHALTUNG AM' },
      jp: { countdown_label: 'ロック解除まで' }
    };

    function applyLanguage(lang) {
      const t = translations[lang] || translations.es;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (t[key]) el.textContent = t[key];
      });
    }

    document.getElementById('langSelector').addEventListener('change', (e) => {
      applyLanguage(e.target.value);
    });
    applyLanguage('es');

    chatUser.focus();
  </script>
</body>
</html>
